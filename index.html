<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicons/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Мои Конспекты | Almanion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.3s ease;
        }

        /* Темная тема для главной страницы */
        body.dark-theme {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        body.dark-theme .subject-card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        body.dark-theme .card-header {
            background: linear-gradient(135deg, #334155 0%, #475569 100%);
        }

        body.dark-theme .subject-card h2 {
            color: #f1f5f9;
        }

        body.dark-theme .subject-card p {
            color: #cbd5e1;
        }

        body.dark-theme .topics-count {
            background: linear-gradient(135deg, #334155, #475569);
            color: #e2e8f0;
        }

        body.dark-theme .last-update {
            color: #94a3b8;
            border-top-color: #334155;
        }

        body.dark-theme .status-active {
            background: linear-gradient(135deg, #064e3b, #065f46);
            color: #6ee7b7;
        }

        body.dark-theme .status-coming {
            background: linear-gradient(135deg, #78350f, #92400e);
            color: #fcd34d;
        }

        body.dark-theme .coming-soon-card .card-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        /* Кнопка переключения темы на главной странице */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 9999;
        }

        .home-container {
            max-width: 1200px;
            padding: 2rem;
        }

        .home-header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }

        .home-header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease;
        }

        .home-header p {
            font-size: 1.3rem;
            opacity: 0.95;
            animation: fadeInUp 0.8s ease;
        }

        .subjects-section {
            margin-top: 2rem;
        }

        .section-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .subjects-grid.coming-soon {
            grid-template-columns: repeat(3, 1fr);
        }

        @media (max-width: 1200px) {
            .subjects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .subjects-grid.coming-soon {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .subjects-grid,
            .subjects-grid.coming-soon {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
            
            .home-container {
                padding: 0.75rem;
            }
            
            .home-header {
                margin-bottom: 1.25rem;
            }
            
            .home-header h1 {
                font-size: 2.2rem;
            }
            
            .section-title {
                font-size: 1.3rem;
                margin-bottom: 0.75rem;
            }
            
            .stats {
                gap: 1rem;
                margin-top: 1.25rem;
            }
            
            .stat-item {
                padding: 0.75rem 1.25rem;
                border-radius: 10px;
            }
        }

        @media (max-width: 480px) {
            .home-container {
                padding: 0.5rem;
            }
            
            .home-header h1 {
                font-size: 1.75rem;
            }
            
            .home-header p {
                font-size: 0.95rem;
            }
            
            .section-title {
                font-size: 1.15rem;
            }
            
            .subjects-grid {
                gap: 0.5rem;
            }
            
            .stat-item {
                padding: 0.625rem 1rem;
            }
            
            .stat-item .number {
                font-size: 1.25rem;
            }
        }

        .subject-card {
            background: white;
            border-radius: 20px;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.8s ease;
            overflow: hidden;
            position: relative;
        }

        .subject-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #2563eb, #7c3aed, #db2777);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .subject-card:hover::before {
            opacity: 1;
        }

        .card-header {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 2px solid #e9ecef;
        }

        .subject-icon {
            font-size: 4.5rem;
            margin-bottom: 0.5rem;
            display: block;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .card-body {
            padding: 1.5rem 2rem 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .subject-card h2 {
            font-size: 1.6rem;
            color: #1e293b;
            margin-bottom: 0.8rem;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 768px) {
            .subject-card {
                flex-direction: row;
                border-radius: 14px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            }
            
            .subject-card:hover {
                transform: translateX(4px);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            }
            
            .subject-card::before {
                width: 100%;
                height: 3px;
            }

            .card-header {
                width: 72px;
                min-width: 72px;
                padding: 0.75rem;
                border-bottom: none;
                border-right: 2px solid #e9ecef;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .subject-icon {
                font-size: 2.25rem;
                margin-bottom: 0;
            }
            
            .card-body {
                padding: 0.75rem 1rem;
                justify-content: center;
            }
            
            .subject-card h2 {
                font-size: 1.1rem;
                text-align: left;
                margin-bottom: 0.25rem;
            }
            
            .card-info {
                margin-top: 0;
            }
            
            .status-badge {
                margin-top: 0;
                font-size: 0.75rem;
                padding: 0.15rem 0.6rem;
            }
            
            .card-info > div {
                text-align: left !important;
            }
        }
        
        @media (max-width: 480px) {
            .subject-card {
                border-radius: 12px;
            }

            .card-header {
                width: 60px;
                min-width: 60px;
                padding: 0.5rem;
            }
            
            .subject-icon {
                font-size: 1.85rem;
            }
            
            .card-body {
                padding: 0.625rem 0.75rem;
            }
            
            .subject-card h2 {
                font-size: 1rem;
            }
        }

        .subject-card p {
            color: #6c757d;
            line-height: 1.6;
        }

        .card-info {
            margin-top: auto;
        }

        .topics-count {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            padding: 0.6rem 1rem;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            border-radius: 10px;
            color: #475569;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .last-update {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid #f1f5f9;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .status-active {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #047857;
        }

        .status-coming {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        .coming-soon-card {
            opacity: 0.7;
            pointer-events: none;
        }

        .coming-soon-card .card-header {
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
        }


        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
        }

        .stat-item .number {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }

        .stat-item .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .home-header h1 {
                font-size: 1.85rem;
            }

            .home-header p {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 768px) {
            body.dark-theme .card-header {
                border-right-color: #475569;
                border-bottom: none;
            }

            .subject-card p {
                display: none;
            }

            .topics-count {
                display: none;
            }
        }
    </style>
</head>
<body>

                                <span class="status-badge status-active">✓ Активно</span>

                <!-- Геометрия -->
                <a href="geometry.html" class="subject-card">
                    <div class="card-header">

                    </div>
                    <div class="card-body">
                        <h2>Геометрия 9 класс</h2>
                        <div class="card-info">
                            <div style="text-align: center;">
                                <span class="status-badge status-active">✓ Активно</span>

                <!-- Ликбезы -->
                <a href="likbez.html" class="subject-card">
                    <div class="card-header">

        </div>

        <div style="text-align: center; margin-top: 3rem; color: white;">
            <p style="font-size: 1.1rem; opacity: 0.9;">
                <strong>Almanion</strong> | <strong>2025-2026</strong>
            </p>
        </div>
    </div>

    <!-- Контейнер для снега -->
    <div class="snow-container" id="snowContainer"></div>
    
    <!-- Контейнер для пасхалок -->
    <div class="easter-eggs-container" id="easterEggsContainer"></div>

    <!-- Firebase Analytics -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-analytics.js"></script>

    <script src="script.js"></script>
    <script src="newyear.js"></script>
    <script src="settings.js"></script>
    <script>
        // Анимация карточек при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.subject-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });
        });
    </script>
    <script src="poll.js"></script>

</html>
